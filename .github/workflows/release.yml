name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: darwin
            arch: arm64
            runner: macos-latest
          - os: darwin
            arch: amd64
            runner: macos-latest
          - os: linux
            arch: amd64
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: deps Linux (Ebitengine)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxxf86vm-dev

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1
          # Le tag est passé par env pour éviter l'interpolation shell directe.
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          BINARY="dist/dcmo5-${{ matrix.os }}-${{ matrix.arch }}"
          go build -ldflags="-s -w -X main.version=${RELEASE_VERSION}" \
            -o "$BINARY" ./cmd/dcmo5

      - name: archive
        run: |
          cd dist
          BINARY="dcmo5-${{ matrix.os }}-${{ matrix.arch }}"
          tar czf "${BINARY}.tar.gz" "$BINARY"
          rm "$BINARY"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dcmo5-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.tar.gz
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
