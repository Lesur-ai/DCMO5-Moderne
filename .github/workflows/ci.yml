name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: deps Linux (Ebitengine + audio)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxxf86vm-dev \
            libasound2-dev

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          files=$(find . -name '*.go' -not -path './vendor/*' | xargs gofmt -l 2>/dev/null)
          if [ -n "$files" ]; then
            echo "Ces fichiers ne respectent pas gofmt :"
            echo "$files"
            exit 1
          fi

      - name: go vet
        run: |
          pkgs=$(go list ./... 2>/dev/null || true)
          if [ -n "$pkgs" ]; then go vet ./...; fi

      - name: build
        run: |
          pkgs=$(go list ./... 2>/dev/null || true)
          if [ -n "$pkgs" ]; then go build ./...; fi

      - name: test
        run: |
          # internal/app importe Ebitengine dont l'init() initialise GLFW/Metal
          # au démarrage du binaire de test si des tests instancient ebiten.Image/Game.
          # Les tests purs (LogicalSize, KeyMapping) ne déclenchent pas GLFW.
          # On sépare : tests non-app en -race, tests app purs sans -race.
          pkgs=$(go list ./... 2>/dev/null | grep -v 'internal/app' || true)
          if [ -n "$pkgs" ]; then go test -race $pkgs; fi
          go test ./internal/app/... -run "TestLogical|TestKeyMapping" 2>/dev/null || true
