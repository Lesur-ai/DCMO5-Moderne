name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: deps Linux (Ebitengine)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxxf86vm-dev

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          files=$(find . -name '*.go' -not -path './vendor/*' | xargs gofmt -l 2>/dev/null)
          if [ -n "$files" ]; then
            echo "Ces fichiers ne respectent pas gofmt :"
            echo "$files"
            exit 1
          fi

      - name: go vet
        run: |
          pkgs=$(go list ./... 2>/dev/null || true)
          if [ -n "$pkgs" ]; then go vet ./...; fi

      - name: build
        run: |
          pkgs=$(go list ./... 2>/dev/null || true)
          if [ -n "$pkgs" ]; then go build ./...; fi

      - name: test
        run: |
          pkgs=$(go list ./... 2>/dev/null || true)
          if [ -n "$pkgs" ]; then go test -race ./...; fi
